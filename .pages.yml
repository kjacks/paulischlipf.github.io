media:
  input: public/uploads
  output: /uploads
content:
  - name: projects
    label: Projects
    type: collection
    path: content/projects
    view:
      fields: [title, date, tags]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: tags
        label: Tags
        type: list
        field:
          type: string
      - name: image
        label: Image
        type: image
      - name: url
        label: Project URL
        type: string
      - name: body
        label: Body
        type: rich-text
  - name: posts
    label: Blog Posts
    type: collection
    path: content/posts
    view:
      fields: [title, date, tags]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: tags
        label: Tags
        type: list
        field:
          type: string
      - name: image
        label: Cover Image
        type: image
      - name: body
        label: Body
        type: rich-text
  - name: about
    label: About
    type: file
    path: content/about.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: image
        label: Profile Image
        type: image
      - name: body
        label: Body
        type: rich-text
