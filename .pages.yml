media:
  input: src/assets
  output: /assets

content:
  - name: paintings
    label: Paintings
    path: src/content/paintings
    type: collection
    view:
      fields: [title_en, date, medium_en]
    fields:
      - name: title_en
        label: Title (English)
        type: string
        required: true
      - name: title_de
        label: Titel (Deutsch)
        type: string
        required: true
      - name: description_en
        label: Description (English)
        type: rich-text
        required: false
      - name: description_de
        label: Beschreibung (Deutsch)
        type: rich-text
        required: false
      - name: date
        label: Date / Datum
        type: date
        required: false
      - name: medium_en
        label: Medium (English)
        type: string
      - name: medium_de
        label: Medium (Deutsch)
        type: string
      - name: image
        label: Image / Bild
        type: image

  - name: objects
    label: Objects
    path: src/content/objects
    type: collection
    view:
      fields: [title_en, date, medium_en]
    fields:
      - name: title_en
        label: Title (English)
        type: string
        required: true
      - name: title_de
        label: Titel (Deutsch)
        type: string
        required: true
      - name: description_en
        label: Description (English)
        type: rich-text
        required: false
      - name: description_de
        label: Beschreibung (Deutsch)
        type: rich-text
        required: false
      - name: date
        label: Date / Datum
        type: date
        required: false
      - name: medium_en
        label: Medium (English)
        type: string
      - name: medium_de
        label: Medium (Deutsch)
        type: string
      - name: image
        label: Image / Bild
        type: image


  - name: installations
    label: Installations
    path: src/content/installations
    type: collection
    view:
      fields: [title_en, date, location_en]
    fields:
      - name: title_en
        label: Title (English)
        type: string
        required: true
      - name: title_de
        label: Titel (Deutsch)
        type: string
        required: true
      - name: description_en
        label: Description (English)
        type: rich-text
        required: false
      - name: description_de
        label: Beschreibung (Deutsch)
        type: rich-text
        required: false
      - name: date
        label: Date / Datum
        type: date
        required: false
      - name: location_en
        label: Location (English)
        type: string
      - name: location_de
        label: Location (Deutsch)
        type: string
      - name: images
        label: Images / Bilder
        type: image
        list: true
     

  - name: bio
    label: Bio
    type: file
    path: src/content/bio/index.md
    fields:
      - name: title_en
        label: Title (English)
        type: string
        required: true
      - name: title_de
        label: Titel (Deutsch)
        type: string
        required: true
      - name: body_en
        label: Bio text (English)
        type: rich-text
      - name: body_de
        label: Bio text (Deutsch)
        type: rich-text
      - name: image
        label: Image
        type: image

  - name: contact
    label: Contact
    type: file
    path: src/content/contact/index.md
    fields:
      - name: title_en
        label: Title (English)
        type: string
        required: true
      - name: title_de
        label: Titel (Deutsch)
        type: string
        required: true
      - name: email
        label: Email
        type: string
      - name: instagram
        label: Instagram
        type: string
      - name: body_en
        label: Contact text (English)
        type: rich-text
      - name: body_de
        label: Contact text (Deutsch)
        type: rich-text

